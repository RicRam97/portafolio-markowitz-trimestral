name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ══════════════════════════════════════════════════
  # Job 1: Frontend (Node.js)
  # ══════════════════════════════════════════════════
  frontend:
    name: Frontend (Node.js)
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./next-frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./next-frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Type Checking
        run: npx tsc --noEmit

  # ══════════════════════════════════════════════════
  # Job 2: Backend (Python)
  # ══════════════════════════════════════════════════
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    # Asume que tu backend está en ./portafolio-markowitz-ml-backend
    # Si está repartido o en la raíz, ajusta el 'working-directory'
    defaults:
      run:
        working-directory: ./portafolio-markowitz-ml-backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install Dependencies
        run: |
          # Instala dependencias base y dev (en caso de que req-dev no existiera localmente,
          # previene que falle instalando también flake8/black/pytest directamente)
          if [ -f "requirements-dev.txt" ]; then
            pip install -r requirements-dev.txt
          elif [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
            pip install flake8 black pytest
          else
            # Intento de fallback a la raíz
            pip install -r ../requirements.txt 
            pip install flake8 black pytest
          fi
          
      - name: Run Linter (Flake8)
        run: flake8 app/

      - name: Run Formatter Check (Black)
        run: black app/

      - name: Run Unit Tests (Pytest)
        # La bandera -v muestra los detalles de cada test
        run: pytest tests/ -v
